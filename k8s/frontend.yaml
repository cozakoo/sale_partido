apiVersion: apps/v1
kind: Deployment
metadata:
  name: salepartido-frontend
  namespace: salepartido
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: salepartido-frontend:latest
        imagePullPolicy:  IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: salepartido-frontend
  namespace: salepartido
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
