services:

  database:
    image: postgres:16 # stable
    container_name: salepartido-database
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: salepartido-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    image: salepartido-backend:latest
    container_name: salepartido-backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - database
      - redis
    volumes:
    - ./backend:/app
    working_dir: /app
    command: ./mvnw spring-boot:run

volumes:
  postgres_data: